<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第7回: 動くギャラリー</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- カーソル（クリック検知用） -->
    <a-camera position="0 1.6 4">
      <a-cursor color="#FF0" fuse="false"></a-cursor>
    </a-camera>

    <!-- 環境光 -->
    <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 3 1" intensity="0.8"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="12" height="12"
             color="#333"></a-plane>

    <!-- 背景 -->
    <a-sky color="#1a1a2e"></a-sky>

    <!-- 展示台1 -->
    <a-box position="-3 0.25 -3" width="1" height="0.5" depth="1"
           color="#555"></a-box>
    <!-- TODO: 展示物1 — 回転アニメーション -->
    <!-- ヒント: animation="property: rotation; to: 0 360 0; dur: 3000; loop: true; easing: linear" -->


    <!-- 展示台2 -->
    <a-box position="0 0.25 -3" width="1" height="0.5" depth="1"
           color="#555"></a-box>
    <!-- TODO: 展示物2 — 浮遊アニメーション -->
    <!-- ヒント: animation="property: position; to: 0 2 -3; dur: 2000; dir: alternate; loop: true" -->


    <!-- 展示台3 -->
    <a-box position="3 0.25 -3" width="1" height="0.5" depth="1"
           color="#555"></a-box>
    <!-- TODO: 展示物3 — 色変化アニメーション -->
    <!-- ヒント: animation="property: material.color; from: red; to: blue; dur: 2000; dir: alternate; loop: true" -->


    <!-- TODO: クリックで反応するオブジェクトを追加 -->
    <!-- ヒント: animation="property: scale; to: 1.5 1.5 1.5; dur: 500; startEvents: click" -->

  </a-scene>
</body>
</html>
