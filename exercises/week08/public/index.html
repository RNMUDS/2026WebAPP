<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第8回: ミニ展示館</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <a-assets>
      <!-- TODO: 3Dモデルを読み込む（3つ以上） -->
      <!-- <a-asset-item id="model1" src="models/example1.glb"></a-asset-item> -->
      <!-- <a-asset-item id="model2" src="models/example2.glb"></a-asset-item> -->
      <!-- <a-asset-item id="model3" src="models/example3.glb"></a-asset-item> -->
    </a-assets>

    <!-- カーソル -->
    <a-camera position="0 1.6 5">
      <a-cursor color="#FF0" fuse="false"></a-cursor>
    </a-camera>

    <!-- ライト -->
    <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 3 1" intensity="0.7"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="14" height="14"
             color="#444"></a-plane>

    <!-- 背景 -->
    <a-sky color="#1a1a2e"></a-sky>

    <!-- 展示台1 -->
    <a-box position="-3 0.3 -3" width="1.5" height="0.6" depth="1.5"
           color="#555"></a-box>
    <!-- TODO: モデル1を配置。scale, position, rotation を調整 -->


    <!-- 展示台2 -->
    <a-box position="0 0.3 -3" width="1.5" height="0.6" depth="1.5"
           color="#555"></a-box>
    <!-- TODO: モデル2を配置 -->


    <!-- 展示台3 -->
    <a-box position="3 0.3 -3" width="1.5" height="0.6" depth="1.5"
           color="#555"></a-box>
    <!-- TODO: モデル3を配置 -->


    <!-- TODO: 展示物の説明テキストを追加 -->
    <!-- <a-text value="作品名" position="-3 0.1 -2" align="center" color="#aaa" width="3"></a-text> -->

  </a-scene>
</body>
</html>
