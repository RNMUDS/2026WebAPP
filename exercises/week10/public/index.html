<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第10回: マルチユーザ3D空間</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    .info { position: fixed; top: 10px; left: 10px; z-index: 999;
            background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
            border-radius: 4px; font-family: sans-serif; font-size: 14px; }
  </style>
</head>
<body>

  <div class="info">
    <span id="user-count">接続中: 0人</span>
  </div>

  <a-scene>
    <a-light type="ambient" color="#BBB" intensity="0.5"></a-light>
    <a-light type="directional" position="-1 3 1" intensity="0.7"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20"
             color="#7BC8A4"></a-plane>

    <!-- 背景 -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- カメラ（WASD移動） -->
    <a-entity id="camera-rig" position="0 0 5">
      <a-camera look-controls wasd-controls="acceleration: 20"></a-camera>
    </a-entity>
  </a-scene>

  <script src="/socket.io/socket.io.js"></script>
  <script src="avatar.js"></script>
</body>
</html>
