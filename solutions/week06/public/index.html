<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第6回: ライティング・カメラ（解答例）</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    .controls {
      position: fixed; top: 10px; left: 10px; z-index: 999;
      display: flex; gap: 8px;
    }
    .controls button {
      padding: 8px 20px; border: none; border-radius: 4px;
      font-size: 16px; cursor: pointer; transition: opacity 0.2s;
    }
    .controls button:hover { opacity: 0.8; }
    .btn-day { background: #F1C40F; color: #333; }
    .btn-night { background: #2c3e50; color: #fff; }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn-day" onclick="setDaytime()">昼</button>
    <button class="btn-night" onclick="setNighttime()">夜</button>
  </div>

  <a-scene shadow="type: pcfsoft">

    <!-- 環境光 -->
    <a-light id="ambient-light" type="ambient" color="#BBB" intensity="0.6"></a-light>

    <!-- 太陽光（平行光） -->
    <a-light id="sun-light" type="directional" color="#FFF" intensity="1"
             position="-1 3 1"
             castShadow="true"
             shadow="mapSize: 1024 1024"></a-light>

    <!-- 室内照明（点光源） -->
    <a-light id="room-light" type="point" color="#FFD700" intensity="0"
             distance="15" position="0 2.8 -2"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="8"
             material="color: #DEB887; roughness: 0.8"
             shadow="receive: true"></a-plane>

    <!-- 壁（奥） -->
    <a-plane position="0 2 -4" width="8" height="4"
             material="color: #FAEBD7; roughness: 1"
             shadow="receive: true"></a-plane>

    <!-- 壁（左） -->
    <a-plane position="-4 2 0" rotation="0 90 0" width="8" height="4"
             material="color: #FAF0E6; roughness: 1"
             shadow="receive: true"></a-plane>

    <!-- 机 -->
    <a-entity position="-1 0 -3">
      <a-box position="0 0.75 0" width="1.2" height="0.05" depth="0.6"
             material="color: #5D4037; roughness: 0.6"
             shadow="cast: true; receive: true"></a-box>
      <a-cylinder position="-0.5 0.375 -0.25" radius="0.03" height="0.75"
                  color="#4E342E" shadow="cast: true"></a-cylinder>
      <a-cylinder position="0.5 0.375 -0.25" radius="0.03" height="0.75"
                  color="#4E342E" shadow="cast: true"></a-cylinder>
      <a-cylinder position="-0.5 0.375 0.25" radius="0.03" height="0.75"
                  color="#4E342E" shadow="cast: true"></a-cylinder>
      <a-cylinder position="0.5 0.375 0.25" radius="0.03" height="0.75"
                  color="#4E342E" shadow="cast: true"></a-cylinder>
    </a-entity>

    <!-- 椅子 -->
    <a-entity position="-1 0 -2.2">
      <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5"
             color="#6D4C41" shadow="cast: true; receive: true"></a-box>
      <a-box position="0 0.7 -0.22" width="0.5" height="0.5" depth="0.05"
             color="#6D4C41" shadow="cast: true"></a-box>
    </a-entity>

    <!-- 箱オブジェクト -->
    <a-box position="1 0.5 -3" color="#C0392B"
           shadow="cast: true; receive: true"></a-box>

    <a-sphere position="2 0.5 -2" radius="0.5" color="#2980B9"
              shadow="cast: true; receive: true"></a-sphere>

    <!-- 天井照明器具（見た目） -->
    <a-cylinder position="0 2.9 -2" radius="0.15" height="0.05"
                material="color: #333; metalness: 0.9; roughness: 0.2"></a-cylinder>

    <!-- 空 -->
    <a-sky id="sky" color="#87CEEB"></a-sky>

  </a-scene>

  <script>
    function setDaytime() {
      document.getElementById('ambient-light')
        .setAttribute('light', { intensity: 0.6 });
      document.getElementById('sun-light')
        .setAttribute('light', { color: '#FFF', intensity: 1 });
      document.getElementById('room-light')
        .setAttribute('light', { intensity: 0 });
      document.getElementById('sky')
        .setAttribute('color', '#87CEEB');
    }

    function setNighttime() {
      document.getElementById('ambient-light')
        .setAttribute('light', { intensity: 0.1 });
      document.getElementById('sun-light')
        .setAttribute('light', { intensity: 0 });
      document.getElementById('room-light')
        .setAttribute('light', { color: '#FFD700', intensity: 0.8 });
      document.getElementById('sky')
        .setAttribute('color', '#0d1b2a');
    }
  </script>

</body>
</html>
