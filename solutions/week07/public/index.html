<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第7回: 動くギャラリー（解答例）</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <a-camera position="0 1.6 5">
      <a-cursor color="#FF0" fuse="false"></a-cursor>
    </a-camera>

    <a-light type="ambient" color="#BBB" intensity="0.4"></a-light>
    <a-light type="directional" position="-1 3 1" intensity="0.6"></a-light>
    <a-light type="point" color="#8844ff" intensity="0.4" position="0 3 -3"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="14" height="14"
             material="color: #222; roughness: 0.3; metalness: 0.5"></a-plane>

    <!-- 背景 -->
    <a-sky color="#0d0d1a"></a-sky>

    <!-- === 展示物1: 回転する多面体 === -->
    <a-box position="-3 0.25 -3" width="1.2" height="0.5" depth="1.2"
           color="#444"></a-box>
    <a-dodecahedron position="-3 1.3 -3" radius="0.4"
                    material="color: #E74C3C; metalness: 0.6; roughness: 0.3"
                    animation="property: rotation; to: 360 360 0;
                               dur: 6000; loop: true; easing: linear">
    </a-dodecahedron>

    <!-- === 展示物2: 浮遊する球 === -->
    <a-box position="0 0.25 -3" width="1.2" height="0.5" depth="1.2"
           color="#444"></a-box>
    <a-sphere position="0 1.3 -3" radius="0.35"
              material="color: #3498DB; metalness: 0.2; roughness: 0.1"
              animation__float="property: position; from: 0 1.3 -3; to: 0 2 -3;
                                dur: 2500; dir: alternate; loop: true;
                                easing: easeInOutQuad"
              animation__glow="property: material.color; from: #3498DB; to: #1ABC9C;
                               dur: 3000; dir: alternate; loop: true">
    </a-sphere>

    <!-- === 展示物3: 色変化するトーラス === -->
    <a-box position="3 0.25 -3" width="1.2" height="0.5" depth="1.2"
           color="#444"></a-box>
    <a-torus position="3 1.5 -3" radius="0.35" radius-tubular="0.08"
             animation__color="property: material.color; from: #F39C12; to: #9B59B6;
                               dur: 2000; dir: alternate; loop: true"
             animation__rotate="property: rotation; to: 360 0 360;
                                dur: 8000; loop: true; easing: linear">
    </a-torus>

    <!-- === 展示物4: クリックで跳ねるキューブ === -->
    <a-box position="-1.5 0.25 -1" width="1.2" height="0.5" depth="1.2"
           color="#444"></a-box>
    <a-box position="-1.5 1 -1" width="0.5" height="0.5" depth="0.5"
           material="color: #2ECC71; roughness: 0.4"
           animation__jump="property: position; from: -1.5 1 -1; to: -1.5 2.5 -1;
                            dur: 400; startEvents: click; easing: easeOutQuad"
           animation__fall="property: position; from: -1.5 2.5 -1; to: -1.5 1 -1;
                            dur: 600; startEvents: animationcomplete__jump;
                            easing: easeOutBounce"
           animation__spin="property: rotation; from: 0 0 0; to: 0 360 0;
                            dur: 1000; startEvents: click">
    </a-box>

    <!-- === 展示物5: ホバーで拡大する円錐 === -->
    <a-box position="1.5 0.25 -1" width="1.2" height="0.5" depth="1.2"
           color="#444"></a-box>
    <a-cone position="1.5 1.2 -1" radius-bottom="0.3" height="0.7"
            material="color: #E67E22; metalness: 0.7; roughness: 0.2"
            animation__grow="property: scale; to: 1.4 1.4 1.4;
                             dur: 300; startEvents: mouseenter;
                             easing: easeOutElastic"
            animation__shrink="property: scale; to: 1 1 1;
                               dur: 300; startEvents: mouseleave"
            animation__rotate="property: rotation; to: 0 360 0;
                               dur: 5000; loop: true; easing: linear">
    </a-cone>

    <!-- 説明テキスト（床面） -->
    <a-text value="Click or hover on exhibits!"
            position="0 0.01 1" rotation="-90 0 0"
            align="center" color="#888" width="6"></a-text>

  </a-scene>
</body>
</html>
