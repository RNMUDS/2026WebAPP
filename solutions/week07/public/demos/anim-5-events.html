<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>1.5 イベントトリガー（マウス/クリックで動かす）</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #111" vr-mode-ui="enabled: false">
    <a-light type="ambient" color="#777"></a-light>
    <a-light type="directional" position="-1 2 1" intensity="0.8"></a-light>

    <a-camera position="0 1.6 0">
      <a-cursor color="#FFB800" fuse="false"></a-cursor>
    </a-camera>

    <!-- マウスを乗せると色が変わる箱（mouseenter / mouseleave） -->
    <a-box id="hoverBox" position="-1.6 1.5 -4" color="#333"
           animation="property: material.color; to: #FF5252;
                      dur: 300; startEvents: mouseenter"
           animation__2="property: material.color; to: #333;
                         dur: 300; startEvents: mouseleave"></a-box>

    <!-- クリックすると拡大＋回転する球（click） -->
    <a-sphere id="clickBall" position="1.6 1.5 -4" radius="0.6" color="#76B900"
              animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5;
                         dur: 400; startEvents: click; dir: alternate; easing: easeOutElastic"
              animation__spin="property: rotation; from: 0 0 0; to: 0 360 0;
                               dur: 700; startEvents: click; easing: easeOutQuad"></a-sphere>

    <a-plane position="0 0 -4" rotation="-90 0 0" width="14" height="14" color="#1a1a1a"></a-plane>
  </a-scene>
</body>
</html>
