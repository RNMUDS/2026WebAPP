<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャットアプリ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
    .header { background: #0066cc; color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; }
    .header .count { font-size: 14px; opacity: 0.8; }
    #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
    .message { background: #fff; padding: 8px 12px; border-radius: 8px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .message .meta { display: flex; gap: 8px; align-items: baseline; }
    .message .name { font-weight: bold; color: #0066cc; font-size: 13px; }
    .message .time { font-size: 11px; color: #999; }
    .message .text { margin-top: 4px; }
    .input-area { display: flex; gap: 8px; padding: 12px; background: #fff; border-top: 1px solid #ddd; }
    .input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .input-area button { padding: 10px 20px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .input-area button:hover { background: #0055aa; }
    #nickname-area { padding: 12px 16px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 8px; align-items: center; }
    #nickname-area label { font-weight: bold; color: #555; white-space: nowrap; }
    #nickname-area input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 150px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>チャット</h1>
    <span class="count" id="user-count">接続中: 0人</span>
  </div>

  <div id="nickname-area">
    <label>ニックネーム:</label>
    <input type="text" id="nickname" placeholder="名前を入力">
  </div>

  <div id="messages"></div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="メッセージを入力...">
    <button id="send-btn">送信</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="chat.js"></script>
</body>
</html>
