<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第5回: 居心地の良い部屋（解答例）</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <a-assets>
      <!-- テクスチャがない場合でもcolorで動作する -->
      <!-- 実際の授業ではフリーテクスチャをダウンロードして使用 -->
    </a-assets>

    <!-- 床（木目風） -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="8"
             material="color: #DEB887; roughness: 0.8; metalness: 0"></a-plane>

    <!-- 壁（奥） -->
    <a-plane position="0 2 -4" width="8" height="4"
             material="color: #FAEBD7; roughness: 1; metalness: 0"></a-plane>

    <!-- 壁（左） -->
    <a-plane position="-4 2 0" rotation="0 90 0" width="8" height="4"
             material="color: #FAF0E6; roughness: 1; metalness: 0"></a-plane>

    <!-- 窓（半透明ガラス） -->
    <a-plane position="-3.98 2 -1.5" rotation="0 90 0" width="1.5" height="1.5"
             material="color: #88ccff; opacity: 0.3; transparent: true;
                       metalness: 0.1; roughness: 0"></a-plane>
    <!-- 窓枠 -->
    <a-box position="-3.96 2 -1.5" rotation="0 90 0" width="1.6" height="0.05" depth="0.05"
           material="color: #fff; roughness: 0.5"></a-box>
    <a-box position="-3.96 2 -1.5" rotation="0 90 0" width="0.05" height="1.6" depth="0.05"
           material="color: #fff; roughness: 0.5"></a-box>

    <!-- 背景 -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- 机 -->
    <a-entity position="-1 0 -3">
      <a-box position="0 0.75 0" width="1.2" height="0.05" depth="0.6"
             material="color: #5D4037; roughness: 0.6; metalness: 0"></a-box>
      <a-cylinder position="-0.5 0.375 -0.25" radius="0.03" height="0.75"
                  material="color: #4E342E; roughness: 0.7"></a-cylinder>
      <a-cylinder position="0.5 0.375 -0.25" radius="0.03" height="0.75"
                  material="color: #4E342E; roughness: 0.7"></a-cylinder>
      <a-cylinder position="-0.5 0.375 0.25" radius="0.03" height="0.75"
                  material="color: #4E342E; roughness: 0.7"></a-cylinder>
      <a-cylinder position="0.5 0.375 0.25" radius="0.03" height="0.75"
                  material="color: #4E342E; roughness: 0.7"></a-cylinder>
    </a-entity>

    <!-- 椅子 -->
    <a-entity position="-1 0 -2.2">
      <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5"
             material="color: #6D4C41; roughness: 0.6"></a-box>
      <a-box position="0 0.7 -0.22" width="0.5" height="0.5" depth="0.05"
             material="color: #6D4C41; roughness: 0.6"></a-box>
      <a-cylinder position="-0.2 0.225 -0.2" radius="0.02" height="0.45"
                  material="color: #5D4037"></a-cylinder>
      <a-cylinder position="0.2 0.225 -0.2" radius="0.02" height="0.45"
                  material="color: #5D4037"></a-cylinder>
      <a-cylinder position="-0.2 0.225 0.2" radius="0.02" height="0.45"
                  material="color: #5D4037"></a-cylinder>
      <a-cylinder position="0.2 0.225 0.2" radius="0.02" height="0.45"
                  material="color: #5D4037"></a-cylinder>
    </a-entity>

    <!-- メタリックなランプ（机の上） -->
    <a-entity position="-0.5 0.78 -3">
      <a-cylinder position="0 0 0" radius="0.08" height="0.02"
                  material="color: #333; metalness: 0.9; roughness: 0.2"></a-cylinder>
      <a-cylinder position="0 0.15 0" radius="0.02" height="0.3"
                  material="color: #555; metalness: 0.9; roughness: 0.2"></a-cylinder>
      <a-cone position="0 0.35 0" radius-bottom="0.15" height="0.15"
              material="color: #F1C40F; metalness: 0.3; roughness: 0.4"></a-cone>
    </a-entity>

    <!-- ベッド -->
    <a-entity position="-3 0 -1">
      <a-box position="0 0.25 0" width="1" height="0.5" depth="2"
             material="color: #5D4037; roughness: 0.7"></a-box>
      <a-box position="0 0.55 0" width="0.9" height="0.1" depth="1.9"
             material="color: #ECF0F1; roughness: 0.9"></a-box>
      <a-box position="0 0.65 -0.7" width="0.6" height="0.1" depth="0.3"
             material="color: #F5F5DC; roughness: 1"></a-box>
      <!-- 毛布 -->
      <a-box position="0 0.62 0.2" width="0.85" height="0.03" depth="1.2"
             material="color: #2980B9; roughness: 1; metalness: 0"></a-box>
    </a-entity>

    <!-- カーペット -->
    <a-plane position="0 0.01 -1" rotation="-90 0 0" width="2.5" height="2"
             material="color: #C0392B; roughness: 1; metalness: 0"></a-plane>

    <!-- コップ（半透明） -->
    <a-cylinder position="-1.3 0.85 -2.8" radius="0.04" height="0.12"
                material="color: #aaddff; opacity: 0.5; transparent: true;
                          metalness: 0; roughness: 0"></a-cylinder>

  </a-scene>
</body>
</html>
