<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第8回: ミニ展示館（解答例）</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <!--
    解答例: テーマ「幾何学ギャラリー」
    ※ 実際の授業ではSketchfab等からglbファイルをダウンロードして使用する。
    この解答例ではglbファイルがなくても動作するようプリミティブで代替。
    glbモデルを使う場合は a-gltf-model タグに差し替える。
  -->
  <a-scene>

    <a-assets>
      <!-- 実際にはここでglbを読み込む -->
      <!-- <a-asset-item id="model1" src="models/tree.glb"></a-asset-item> -->
    </a-assets>

    <a-camera position="0 1.6 6">
      <a-cursor color="#FF0" fuse="false"></a-cursor>
    </a-camera>

    <a-light type="ambient" color="#BBB" intensity="0.4"></a-light>
    <a-light type="directional" position="-1 3 1" intensity="0.6"></a-light>
    <a-light type="point" color="#4488ff" intensity="0.3" position="-3 3 -3"></a-light>
    <a-light type="point" color="#ff4488" intensity="0.3" position="3 3 -3"></a-light>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="16"
             material="color: #1a1a1a; roughness: 0.3; metalness: 0.5"></a-plane>

    <!-- 背景 -->
    <a-sky color="#0a0a14"></a-sky>

    <!-- === 展示物1: 回転する正十二面体 === -->
    <a-box position="-4 0.3 -3" width="1.5" height="0.6" depth="1.5"
           material="color: #333; metalness: 0.8; roughness: 0.2"></a-box>
    <!-- glbモデルの場合: <a-gltf-model src="#model1" position="-4 1.5 -3" scale="0.5 0.5 0.5"> -->
    <a-dodecahedron position="-4 1.5 -3" radius="0.5"
                    material="color: #E74C3C; metalness: 0.7; roughness: 0.2"
                    animation="property: rotation; to: 360 360 0;
                               dur: 8000; loop: true; easing: linear">
    </a-dodecahedron>
    <a-text value="Dodecahedron" position="-4 0.05 -2" align="center"
            color="#888" width="3"></a-text>

    <!-- === 展示物2: 浮遊する球体 === -->
    <a-box position="0 0.3 -3" width="1.5" height="0.6" depth="1.5"
           material="color: #333; metalness: 0.8; roughness: 0.2"></a-box>
    <a-sphere position="0 1.5 -3" radius="0.45"
              material="color: #3498DB; metalness: 0.3; roughness: 0.05"
              animation__float="property: position; from: 0 1.5 -3; to: 0 2.2 -3;
                                dur: 3000; dir: alternate; loop: true;
                                easing: easeInOutSine"
              animation__color="property: material.color; from: #3498DB; to: #1ABC9C;
                                dur: 4000; dir: alternate; loop: true">
    </a-sphere>
    <a-text value="Floating Sphere" position="0 0.05 -2" align="center"
            color="#888" width="3"></a-text>

    <!-- === 展示物3: クリックで変形するトーラス === -->
    <a-box position="4 0.3 -3" width="1.5" height="0.6" depth="1.5"
           material="color: #333; metalness: 0.8; roughness: 0.2"></a-box>
    <a-torus position="4 1.5 -3" radius="0.4" radius-tubular="0.1"
             material="color: #F39C12; metalness: 0.6; roughness: 0.3"
             animation__rotate="property: rotation; to: 0 360 360;
                                dur: 10000; loop: true; easing: linear"
             animation__grow="property: scale; to: 1.5 1.5 1.5;
                              dur: 500; startEvents: click; easing: easeOutElastic"
             animation__shrink="property: scale; to: 1 1 1;
                                dur: 500; startEvents: animationcomplete__grow">
    </a-torus>
    <a-text value="Interactive Torus" position="4 0.05 -2" align="center"
            color="#888" width="3"></a-text>

    <!-- 壁面の装飾 -->
    <a-plane position="0 2.5 -6" width="16" height="5"
             material="color: #111; roughness: 1"></a-plane>
    <a-text value="GEOMETRY GALLERY" position="0 3.5 -5.9"
            align="center" color="#fff" width="8"></a-text>

    <!-- ガイドテキスト -->
    <a-text value="Click on the torus!" position="0 0.01 3"
            rotation="-90 0 0" align="center" color="#666" width="5"></a-text>

  </a-scene>
</body>
</html>
