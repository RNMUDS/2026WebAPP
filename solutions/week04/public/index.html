<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>第4回: 自分の部屋（解答例）</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene>

    <!-- 床 -->
    <a-plane position="0 0 0" rotation="-90 0 0"
             width="8" height="8" color="#DEB887"></a-plane>

    <!-- 壁（奥） -->
    <a-plane position="0 2 -4" width="8" height="4" color="#FAEBD7"></a-plane>

    <!-- 壁（左） -->
    <a-plane position="-4 2 0" rotation="0 90 0"
             width="8" height="4" color="#FAF0E6"></a-plane>

    <!-- 背景（空） -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- 机 -->
    <a-entity position="-1 0 -3">
      <!-- 天板 -->
      <a-box position="0 0.75 0" width="1.2" height="0.05" depth="0.6"
             color="#8B4513"></a-box>
      <!-- 脚 -->
      <a-cylinder position="-0.5 0.375 -0.25" radius="0.03" height="0.75"
                  color="#A0522D"></a-cylinder>
      <a-cylinder position="0.5 0.375 -0.25" radius="0.03" height="0.75"
                  color="#A0522D"></a-cylinder>
      <a-cylinder position="-0.5 0.375 0.25" radius="0.03" height="0.75"
                  color="#A0522D"></a-cylinder>
      <a-cylinder position="0.5 0.375 0.25" radius="0.03" height="0.75"
                  color="#A0522D"></a-cylinder>
    </a-entity>

    <!-- 椅子 -->
    <a-entity position="-1 0 -2.2">
      <!-- 座面 -->
      <a-box position="0 0.45 0" width="0.5" height="0.05" depth="0.5"
             color="#CD853F"></a-box>
      <!-- 背もたれ -->
      <a-box position="0 0.7 -0.22" width="0.5" height="0.5" depth="0.05"
             color="#CD853F"></a-box>
      <!-- 脚 -->
      <a-cylinder position="-0.2 0.225 -0.2" radius="0.02" height="0.45"
                  color="#8B4513"></a-cylinder>
      <a-cylinder position="0.2 0.225 -0.2" radius="0.02" height="0.45"
                  color="#8B4513"></a-cylinder>
      <a-cylinder position="-0.2 0.225 0.2" radius="0.02" height="0.45"
                  color="#8B4513"></a-cylinder>
      <a-cylinder position="0.2 0.225 0.2" radius="0.02" height="0.45"
                  color="#8B4513"></a-cylinder>
    </a-entity>

    <!-- 本棚 -->
    <a-entity position="2 0 -3.5">
      <!-- 枠 -->
      <a-box position="0 0.9 0" width="1" height="1.8" depth="0.3"
             color="#A0522D"></a-box>
      <!-- 棚板 -->
      <a-box position="0 0.6 0.02" width="0.9" height="0.03" depth="0.28"
             color="#CD853F"></a-box>
      <a-box position="0 1.2 0.02" width="0.9" height="0.03" depth="0.28"
             color="#CD853F"></a-box>
      <!-- 本（色違いのbox） -->
      <a-box position="-0.2 0.35 0.02" width="0.15" height="0.5" depth="0.2"
             color="#C0392B"></a-box>
      <a-box position="0 0.35 0.02" width="0.15" height="0.5" depth="0.2"
             color="#2980B9"></a-box>
      <a-box position="0.2 0.35 0.02" width="0.15" height="0.5" depth="0.2"
             color="#27AE60"></a-box>
      <a-box position="-0.15 0.95 0.02" width="0.15" height="0.5" depth="0.2"
             color="#F39C12"></a-box>
      <a-box position="0.1 0.95 0.02" width="0.2" height="0.5" depth="0.2"
             color="#8E44AD"></a-box>
    </a-entity>

    <!-- ベッド -->
    <a-entity position="-3 0 -1">
      <!-- フレーム -->
      <a-box position="0 0.25 0" width="1" height="0.5" depth="2"
             color="#8B4513"></a-box>
      <!-- マットレス -->
      <a-box position="0 0.55 0" width="0.9" height="0.1" depth="1.9"
             color="#ECF0F1"></a-box>
      <!-- 枕 -->
      <a-box position="0 0.65 -0.7" width="0.6" height="0.1" depth="0.3"
             color="#F5F5DC"></a-box>
    </a-entity>

    <!-- ランプ（机の上） -->
    <a-entity position="-0.5 0.78 -3">
      <a-cylinder position="0 0.15 0" radius="0.05" height="0.3"
                  color="#333"></a-cylinder>
      <a-cone position="0 0.35 0" radius-bottom="0.15" height="0.15"
              color="#F1C40F"></a-cone>
    </a-entity>

  </a-scene>
</body>
</html>
